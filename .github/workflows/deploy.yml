name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run project CI
        run: make ci

  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "image=${{ secrets.DOCKERHUB_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_REPOSITORY }}:latest

  deploy:
    name: Pull image and run on droplet
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER || 'root' }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          test -n "$DROPLET_HOST" || { echo "::error::Missing DROPLET_HOST"; exit 1; }
          test -n "$DROPLET_USER" || { echo "::error::Missing DROPLET_USER"; exit 1; }
          test -n "$DROPLET_SSH_KEY" || { echo "::error::Missing DROPLET_SSH_KEY"; exit 1; }
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::Missing DOCKERHUB_USERNAME"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::Missing DOCKERHUB_TOKEN"; exit 1; }
          test -n "$PROD_ENV_FILE" || { echo "::error::Missing PROD_ENV_FILE"; exit 1; }
          case "$DROPLET_SSH_KEY" in
            *"BEGIN OPENSSH PRIVATE KEY"*|*"BEGIN RSA PRIVATE KEY"*|*"BEGIN EC PRIVATE KEY"*) ;;
            *)
              echo "::error::DROPLET_SSH_KEY must contain the full private key file, not the public key or ssh command."
              exit 1
              ;;
          esac

      - name: Prepare deploy folder
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/skybyte_fullStack' }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          envs: DEPLOY_PATH
          script: mkdir -p "$DEPLOY_PATH"

      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          target: ${{ secrets.DEPLOY_PATH || '/opt/skybyte_fullStack' }}
          overwrite: true
          source: docker,Makefile,compose.production.yml

      - name: Pull and restart app
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/skybyte_fullStack' }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          WEB_IMAGE: ${{ needs.build.outputs.image }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          envs: DEPLOY_PATH,PROD_ENV_FILE,WEB_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            cd "$DEPLOY_PATH"
            printf '%s\n' "$PROD_ENV_FILE" > .env
            printf '\nWEB_IMAGE=%s\n' "$WEB_IMAGE" >> .env
            chmod 600 .env
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            make prod-pull
            make status
